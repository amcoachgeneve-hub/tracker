<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Helvetica Neue',sans-serif;background:#F4F4F4;-webkit-font-smoothing:antialiased;color:#1A1A1A}
button,input,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}
input,textarea{outline:none}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}

/* HEADER */
.hdr{background:#1A1A1A;padding:20px 18px 16px;position:sticky;top:0;z-index:50}
.hdr-brand{display:flex;align-items:center;gap:8px;margin-bottom:2px}

.hdr-sub{color:#888;font-size:13px;padding-left:11px;font-weight:700}

/* ONBOARDING / LOGIN */
.dark-screen{min-height:100vh;background:#1A1A1A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.dark-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dark-brand .bar{height:26px;width:4px}
.dark-brand span{color:#fff;font-weight:900;font-size:22px;letter-spacing:3px;text-transform:uppercase}
.dark-sub{color:#555;font-size:13px;margin-bottom:44px}
.dark-label{color:#fff;font-weight:900;font-size:17px;margin-bottom:12px}
.dark-input{width:100%;max-width:340px;padding:16px 18px;border-radius:12px;border:2px solid #2A2A2A;background:#111;color:#fff;font-size:17px;font-weight:700;text-align:center;margin-bottom:20px;display:block;margin-left:auto;margin-right:auto}

.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-label{font-weight:800;font-size:11px;color:#AAA;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.num-input{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #E8E8E8;font-size:18px;font-weight:900;background:#fff;color:#1A1A1A}

/* MOOD BUTTONS */
.mood-row{display:flex;gap:6px}
.mood-btn{flex:1;padding:11px 0;border-radius:10px;background:#F0F0F0;color:#888;font-weight:800;font-size:11px;transition:all .12s}
.mood-btn.active{color:#fff;transform:scale(1.03)}

/* HABITS */
.habit{display:flex;align-items:center;justify-content:space-between;padding:17px 18px;background:#fff;border-radius:14px;border:2px solid #E8E8E8;margin-bottom:9px;transition:all .15s;user-select:none;cursor:pointer}
.habit.checked{color:#fff}
.habit-left{display:flex;align-items:center;gap:13px}
.habit-icon{font-size:26px}
.habit-name{font-weight:800;font-size:15px;color:#1A1A1A}
.habit.checked .habit-name{color:#fff}
.habit-check{width:28px;height:28px;border-radius:50%;border:2.5px solid #DDD;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px}
.habit.checked .habit-check{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.2)}

/* SCALE 1-10 */
.scale-row{display:flex;gap:4px;margin-bottom:4px}
.scale-btn{flex:1;aspect-ratio:1;border-radius:7px;background:#EFEFEF;color:#999;font-weight:900;font-size:12px;transition:all .12s}
.scale-btn.active{color:#fff;transform:scale(1.1)}

/* TEXTAREA */
.txt-label{font-weight:800;font-size:11px;color:#1A1A1A;margin-bottom:6px;text-transform:uppercase}
.txt-area{width:100%;padding:12px 13px;border-radius:10px;border:1.5px solid #E0E0E0;font-size:14px;resize:vertical;background:#fff;color:#1A1A1A;line-height:1.5;margin-bottom:14px;min-height:60px}

.month-hdr .mh-left{display:flex;align-items:center;gap:10px}
.mh-name{font-weight:900;font-size:15px;color:#1A1A1A}

.cal-dayname{text-align:center;font-size:9px;font-weight:700;color:#CCC}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}

.ring-wrap{position:relative;display:inline-block}
.ring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900}

/* STATS */

.filter-btn{flex:1;padding:10px 0;border-radius:10px;background:#EBEBEB;color:#888;font-weight:800;font-size:12px}

.chart-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.chart-title{font-weight:900;font-size:14px;color:#1A1A1A;flex:1}
.chart-avg{font-size:11px;color:#AAA}
.chart-empty{height:80px;display:flex;align-items:center;justify-content:center;color:#CCC;font-size:13px}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1.5px solid #EEE;display:flex;padding:10px 0 18px;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-ico{font-size:22px}
.nav-lbl{font-size:10px;font-weight:600;color:#BBB}

/* MISC */
.big-btn{width:100%;padding:18px 0;border-radius:14px;background:#D52B1E;color:#fff;font-weight:900;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;box-shadow:0 4px 18px rgba(213,43,30,.27);margin-bottom:12px}

.info-banner{background:#EEF4FF;border:2px solid #C5D8F0;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#5580AA;font-weight:700}

// ═══════════ STORAGE LOCAL ═══════════
function lsGet(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsGetStr(k){try{return localStorage.getItem(k)||"";}catch(e){return "";}}
function lsSetStr(k,v){try{localStorage.setItem(k,v);}catch(e){}}

function getAllData(){return lsGet("amcoach_"+CLIENT,{});}

// ═══════════ SUPABASE SYNC ═══════════
function sbFetch(path,opts){
  opts=opts||{};
  var headers={
    "apikey":SB_KEY,
    "Authorization":"Bearer "+SB_KEY,
    "Content-Type":"application/json"
  };
  if(opts.prefer)headers["Prefer"]=opts.prefer;
  return fetch(SB_URL+"/rest/v1/"+path,{
    method:opts.method||"GET",
    headers:headers,
    body:opts.body?JSON.stringify(opts.body):undefined
  });
}

function syncDayToCloud(idx,data){
  if(!CLIENT)return;
  state.syncStatus="sync";
  updateSyncBadge();
  function pushTracking(){
    return sbFetch("tracking?on_conflict=client_slug,day_index",{
      method:"POST",
      prefer:"resolution=merge-duplicates",
      body:{client_slug:CLIENT,day_index:idx,data:data,updated_at:new Date().toISOString()}
    });
  }
  pushTracking().then(function(r){
    if(r.ok){
      state.syncStatus="ok";updateSyncBadge();
      setTimeout(function(){state.syncStatus="";updateSyncBadge();},2000);
      return null;
    }
    // Probablement client absent du cloud (FK) : on le crée puis on réessaie
    var name=lsGetStr("amcoach_name_"+CLIENT)||CLIENT;
    var start=lsGetStr("amcoach_start_"+CLIENT)||new Date().toISOString().split("T")[0];
    return sbFetch("clients?on_conflict=slug",{
      method:"POST",
      prefer:"resolution=merge-duplicates",
      body:{slug:CLIENT,name:name,start_date:start}
    }).then(function(){return pushTracking();}).then(function(r2){
      state.syncStatus=r2.ok?"ok":"err";
      updateSyncBadge();
      if(r2.ok)setTimeout(function(){state.syncStatus="";updateSyncBadge();},2000);
    });
  }).catch(function(){
    state.syncStatus="err";
    updateSyncBadge();
  });
}

function updateSyncBadge(){
  var el=document.getElementById("sync-badge");
  if(!el)return;
  if(state.syncStatus==="sync"){el.textContent="☁️ ...";el.style.color="#FF9800";}
  else if(state.syncStatus==="ok"){el.textContent="☁️ ✓";el.style.color="#4CAF50";}
  else if(state.syncStatus==="err"){el.textContent="☁️ hors-ligne";el.style.color="#D52B1E";}
  else{el.textContent="";}
}

function ensureClientInCloud(name,startDate){
  if(!CLIENT)return;
  sbFetch("clients?on_conflict=slug",{
    method:"POST",
    prefer:"resolution=merge-duplicates",
    body:{slug:CLIENT,name:name,start_date:startDate}
  }).catch(function(){});
}

function loadFromCloud(cb){
  if(!CLIENT){cb();return;}
  // Load client info + tracking data from Supabase
  Promise.all([
    sbFetch("clients?slug=eq."+encodeURIComponent(CLIENT)+"&select=*").then(function(r){return r.json();}),
    sbFetch("tracking?client_slug=eq."+encodeURIComponent(CLIENT)+"&select=day_index,data").then(function(r){return r.json();})
  ]).then(function(results){
    var clients=results[0]||[], rows=results[1]||[];
    if(clients.length>0){
      lsSetStr("amcoach_name_"+CLIENT,clients[0].name);
      lsSetStr("amcoach_start_"+CLIENT,clients[0].start_date);
    }
    if(rows.length>0){
      var all=getAllData();
      for(var i=0;i<rows.length;i++){
        all[rows[i].day_index]=rows[i].data;
      }
      lsSet("amcoach_"+CLIENT,all);
    }
    cb();
  }).catch(function(){cb();});
}

function saveDay(idx,data){
  var all=getAllData();
  all[idx]=data;
  lsSet("amcoach_"+CLIENT,all);
  syncDayToCloud(idx,data);
}

function getToday90(startDate){
  if(!startDate)return 0;
  var diff=Math.floor((Date.now()-new Date(startDate).getTime())/86400000);
  return Math.max(0,Math.min(diff,89));
}

function computeAlert(allData,today90){
  // Analyse les 7 derniers jours remplis (min 4 pour être fiable)
  var days=[];
  for(var i=today90;i>=0&&days.length<7;i--){
    if(allData[i]&&allData[i].habits)days.push(allData[i].habits);
  }
  if(days.length<4)return null;
  var worst=null,worstRate=1;
  for(var h=0;h<HABITS.length;h++){
    var id=HABITS[h].id,done=0;
    for(var d=0;d<days.length;d++){if(days[d][id])done++;}
    var rate=done/days.length;
    if(rate<0.5&&rate<worstRate){worstRate=rate;worst=id;}
  }
  var span=Math.min(7,today90+1);
  if(span>=4&&allData[502]){
    var bDone=0;for(var b3=today90-span+1;b3<=today90;b3++){if(hasBrique(allData,b3))bDone++;}
    var bRate=bDone/span;
    if(bRate<0.5&&bRate<worstRate){worstRate=bRate;worst="identite";}
  }
  if(span>=4){
    var mWon=0;for(var m3=today90-span+1;m3<=today90;m3++){if(missionWon(allData,m3))mWon++;}
    var mRate=mWon/span;
    if(mRate<0.5&&mRate<worstRate){worstRate=mRate;worst="onething";}
  }
  return worst?{habit:worst,msg:HABIT_ALERTS[worst]}:null;
}

function lastActLabel(allData){
  var la=allData&&allData[505]&&allData[505].d;
  if(!la)return {t:"jamais ouverte",c:"#D52B1E"};
  var diff=Math.floor((new Date(new Date().toISOString().split("T")[0])-new Date(la))/86400000);
  if(diff<=0)return {t:"aujourd'hui",c:"#4CAF50"};
  if(diff===1)return {t:"hier",c:"#8BC34A"};
  return {t:"il y a "+diff+" jours",c:diff>=3?"#D52B1E":"#E65100"};
}
function slugHash(s){var h=0;s=s||"";for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return h;}
function pickPensee(allData,today90){
  var qgc=allData[502];
  // Pensée d'identité 1×/semaine (jour 3 de chaque semaine)
  if(qgc&&qgc.identity&&today90%7===2){
    return "🧱 Chaque action d'aujourd'hui pose une brique de plus vers celui que tu deviens : « "+qgc.identity+" ». La forteresse se souvient de tout ce que tu fais dans l'ombre.";
  }
  var off=slugHash(CLIENT||"");
  // Mission perdue hier → résilience
  var y=allData[200+(today90-1)];
  if(y&&y.status==="lost"){
    var pool=PENSEES.filter(function(p){return /relève|Tombe|cendres|recule|tailleur|chenille|échou|tempête/.test(p);});
    if(pool.length)return pool[(today90+off)%pool.length];
  }
  // Combo 7+ → guerrier/constance
  var st=computeStreak(allData,today90);
  if(st>=7){
    var pool2=PENSEES.filter(function(p){return /guerrier|discipline|constance|champion|habitude/i.test(p);});
    if(pool2.length)return pool2[(today90+off)%pool2.length];
  }
  return PENSEES[(today90+off)%PENSEES.length];
}

function computeStreak(allData,today90){

  var start=allData[today90]?today90:today90-1;

  for(var i=start;i>=0;i--){

function dayScore(d){
  if(!d||!d.habits)return null;
  var done=0;
  for(var i=0;i<HABITS.length;i++){if(d.habits[HABITS[i].id])done++;}
  return Math.round(done/HABITS.length*100);
}
function computeSeries(allData,days){
  var out=[];
  for(var i=0;i<days;i++){
    var d=allData[i]||{};
    var has=Object.keys(d).length>0;
    out.push({
      day:i+1,
      score:has?dayScore(d):null,
      poids:d.poids?parseFloat(d.poids):null,
      mental:(d.mental!=null&&d.mental!=="")?(4-d.mental)*25:null,
      energie:(d.energie!=null&&d.energie!=="")?d.energie*25:null,
      sommeilH:d.sommeilH?parseFloat(d.sommeilH):null,
      habits:d.habits||null,
      bilan:d.bilan||null
    });
  }
  return out;
}
function avgOf(series,key){
  var v=[];
  for(var i=0;i<series.length;i++){if(series[i][key]!=null)v.push(series[i][key]);}
  if(!v.length)return null;
  var s=0;for(var j=0;j<v.length;j++)s+=v[j];
  return Math.round(s/v.length*10)/10;
}

// ═══════════ SVG CHART ═══════════
function svgLineChart(values,color,opts){
  opts=opts||{};
  var W=opts.width||340, H=opts.height||140, pad={t:8,r:8,b:22,l:34};
  var valid=values.filter(function(v){return v!=null;});
  if(valid.length<2)return '<div class="chart-empty">Aucune donnée encore</div>';
  var min=opts.min!=null?opts.min:Math.min.apply(null,valid);
  var max=opts.max!=null?opts.max:Math.max.apply(null,valid);
  if(min===max){min-=1;max+=1;}
  var range=max-min;
  var iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  var n=values.length;

  function px(i){return pad.l+(i/(n-1))*iw;}
  function py(v){return pad.t+ih-((v-min)/range)*ih;}

  var grid="";
  for(var g=0;g<=3;g++){
    var gy=pad.t+ih*(g/3);
    var gv=max-(range*(g/3));
    grid+='<line x1="'+pad.l+'" y1="'+gy.toFixed(1)+'" x2="'+(W-pad.r)+'" y2="'+gy.toFixed(1)+'" stroke="#F0F0F0" stroke-width="1"/>';
    grid+='<text x="'+(pad.l-6)+'" y="'+(gy+3).toFixed(1)+'" font-size="9" fill="#BBB" text-anchor="end">'+(Math.round(gv*10)/10)+'</text>';
  }
  var step=Math.max(1,Math.ceil(n/6));
  var xlabels="";
  for(var x=0;x<n;x+=step){
    xlabels+='<text x="'+px(x).toFixed(1)+'" y="'+(H-6)+'" font-size="9" fill="#BBB" text-anchor="middle">J'+(x+1)+'</text>';
  }
  var path="", started=false;
  for(var i2=0;i2<n;i2++){
    var v2=values[i2];
    if(v2==null){started=false;continue;}
    var X=px(i2).toFixed(1), Y=py(v2).toFixed(1);
    path+=(started?"L":"M")+X+","+Y;
    started=true;
  }
  var lastIdx=-1;
  for(var i3=n-1;i3>=0;i3--){if(values[i3]!=null){lastIdx=i3;break;}}
  var dot=lastIdx>=0?'<circle cx="'+px(lastIdx).toFixed(1)+'" cy="'+py(values[lastIdx]).toFixed(1)+'" r="4" fill="'+color+'" stroke="#fff" stroke-width="2"/>':"";

  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block">'+grid+xlabels+
    '<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+dot+'</svg>';
}

function svgRing(pct,color,size){

    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#EBEBEB" stroke-width="6"/>'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="6" stroke-dasharray="'+(c*p).toFixed(1)+' '+c.toFixed(1)+'" stroke-linecap="round"/></svg>';
}

    var res=qgRes(allData,today90);
    var lvl=qgLevel(res.total);
    var nxtL=qgNext(res.total);
    var lvlName=lvl.min>=110?qgc.identity:lvl.name;
    var qToday=allData[400+today90]||{};
    h+='<div class="card" style="margin-bottom:18px;background:linear-gradient(160deg,#0d1b0d,#1a2e1a);padding:18px;border:none">'+
      '<div style="color:#8BC34A;font-weight:800;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">🏰 Mon identité en construction</div>'+
      '<div style="color:#fff;font-weight:900;font-size:13px;margin-bottom:10px">🎯 '+esc(qgc.identity)+'</div>'+
      '<div style="text-align:center;position:relative;height:110px;margin-bottom:10px">'+
      '<svg width="150" height="110" style="position:absolute;left:50%;transform:translateX(-50%)">'+
      '<circle cx="75" cy="60" r="'+lvl.radius+'" fill="rgba(139,195,74,.12)" stroke="#8BC34A" stroke-width="1.5" stroke-dasharray="4 4"/></svg>'+
      '<div id="qg-house" style="position:absolute;left:50%;top:38px;transform:translateX(-50%);font-size:40px">'+lvl.icon+'</div></div>'+
      '<div style="text-align:center;color:#fff;font-weight:900;font-size:15px">'+esc(lvlName)+'</div>'+
      '<div style="text-align:center;color:#8BC34A;font-size:11px;font-weight:700;margin:4px 0 12px">🧱 '+res.total+' brique'+(res.total>1?'s':'')+' posée'+(res.total>1?'s':'')+(nxtL?' · prochain niveau à '+nxtL.min+' briques':' · SOMMET ATTEINT')+'</div>'+
      (function(){var bs2=comboStreak(allData,today90,hasBrique);return bs2>0?'<div style="text-align:center;font-size:12px;font-weight:900;margin:-6px 0 12px;color:'+streakBadge(bs2).c+'">COMBO '+streakBadge(bs2).e+' '+bs2+' jour'+(bs2>1?'s':'')+' de briques</div>':'';})()+
      '<div style="color:#8BC34A;font-weight:800;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">✅ Mes actions du jour — chaque action validée = 1 brique</div>'+
      '<button id="qg-terrain" style="width:100%;padding:13px 0;border-radius:11px;background:'+(qToday.p?"#2A3A2A":"#5D4037")+';color:'+(qToday.p?"#6A8A6A":"#fff")+';font-weight:900;font-size:13px;margin-bottom:8px">'+(qToday.p?"✅ "+esc(qgc.v1)+" — fait (re-tape pour annuler)":"⬜ "+esc(qgc.v1))+'</button>'+
      '<button id="qg-digital" style="width:100%;padding:13px 0;border-radius:11px;background:'+(qToday.e?"#2A3A2A":"#0057A8")+';color:'+(qToday.e?"#6A8A6A":"#fff")+';font-weight:900;font-size:13px">'+(qToday.e?"✅ "+esc(qgc.v2)+" — fait (re-tape pour annuler)":"⬜ "+esc(qgc.v2))+'</button>'+
      (function(){
        var qh="";
        var qs=[qgc.q1,qgc.q2];
        for(var qi=0;qi<2;qi++){
          var qk=qs[qi];
          if(!qk||!QUESTS[qk])continue;
          var Q=QUESTS[qk];
          var done=qi===0?qToday.s1:qToday.s2;
          qh+='<button class="qg-quest" data-q="'+(qi+1)+'" style="width:100%;margin-top:8px;padding:13px 0;border-radius:11px;background:'+(done?"#2A3A2A":"#3E2723")+';color:'+(done?"#6A8A6A":"#E8C547")+';font-weight:900;font-size:13px">'+(done?"✓ "+Q.icon+" "+Q.name+" validé (re-tape pour annuler)":Q.icon+" "+Q.name+" — "+esc(Q.hack))+'</button>';
        }
        return qh;
      })()+
      '<button id="qg-edit" style="width:100%;margin-top:8px;font-size:10px;color:#5A7A5A;padding:4px 0">✏️ modifier mon identité</button></div>';
  }
  if(state.qgForm){
    var q0=qgc||{};
    h+='<div class="card" style="margin-bottom:18px;padding:18px 16px">'+
      '<div style="font-weight:900;font-size:14px;margin-bottom:6px">🎯 Qui veux-tu devenir ?</div>'+
      '<div style="font-size:12px;color:#666;line-height:1.75;margin-bottom:8px">Tu ne changes pas en te fixant des objectifs. Tu changes en <strong>devenant quelqu\'un d\'autre</strong>.</div>'+
      '<div style="font-size:12px;color:#666;line-height:1.75;margin-bottom:8px">La preuve : à qui on propose une cigarette, deux réponses possibles. <em>« Non merci, j\'essaie d\'arrêter »</em> — cette personne se voit encore comme un fumeur qui lutte. <em>« Non merci, je ne fume pas »</em> — celle-là a changé d\'identité. Elle ne résiste plus : elle EST autre chose. Pareil pour le sport : « j\'essaie de m\'y mettre » contre « je suis sportif ». Le premier lutte, le second vit.</div>'+
      '<div style="font-size:12px;color:#666;line-height:1.75;margin-bottom:14px">Comment on bascule ? <strong>Par les briques.</strong> Chaque action quotidienne pose une brique de ta nouvelle identité : chaque séance faite est une brique « je suis sportif », chaque repas préparé une brique « je prends soin de moi ». Une brique seule ne fait rien — mais l\'accumulation construit la forteresse. <strong>Deviens la personne, et les résultats suivront.</strong> <span style="color:#AAA">(James Clear, Atomic Habits)</span></div>'+
      '<div style="font-weight:800;font-size:11px;color:#AAA;margin-bottom:6px">MON IDENTITÉ CIBLE</div>'+
      '<input id="qg-identity" class="num-input" style="font-weight:400;font-size:15px;margin-bottom:12px" placeholder="ex: Père en pleine santé, Athlète discipliné..." value="'+esc(q0.identity||"")+'"/>'+
      '<div style="font-weight:800;font-size:11px;color:#AAA;margin-bottom:6px">ACTION QUOTIDIENNE N°1 (terrain)</div>'+
      '<input id="qg-v1" class="num-input" style="font-weight:400;font-size:14px;margin-bottom:12px" placeholder="ex: Faire ma séance de sport" value="'+esc(q0.v1||"")+'"/>'+
      '<div style="font-weight:800;font-size:11px;color:#AAA;margin-bottom:6px">ACTION QUOTIDIENNE N°2 (action clé)</div>'+
      '<input id="qg-v2" class="num-input" style="font-weight:400;font-size:14px;margin-bottom:14px" placeholder="ex: Préparer mes repas de demain" value="'+esc(q0.v2||"")+'"/>'+
      '<div style="font-weight:800;font-size:11px;color:#AAA;margin-bottom:8px">⚔️ MA QUÊTE SECONDAIRE DU BLOC (1 seule — cible ta plus grande faiblesse)</div>'+
      (function(){
        var qh="";
        for(var qk in QUESTS){
          var Q=QUESTS[qk];
          var checked=q0.q1===qk||q0.q2===qk;
          qh+='<label style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F2F2F2;cursor:pointer"><input type="radio" name="qg-quest" class="qg-quest-cb" value="'+qk+'" '+(checked?'checked':'')+' style="width:20px;height:20px;accent-color:'+R+';flex-shrink:0;margin-top:2px"/><span><strong style="font-size:13px">'+Q.icon+' '+Q.name+'</strong><br><span style="font-size:11px;color:#999">'+Q.hack+'</span></span></label>';
        }
        return qh;
      })()+
      '<div style="height:14px"></div>'+
      '<button id="qg-save" style="width:100%;padding:14px 0;border-radius:12px;background:'+R+';color:#fff;font-weight:900;font-size:14px">Verrouiller mon identité 🔒</button></div>';
  }

  // 🌙 PENSÉE DU SOIR
  var pensee=pickPensee(allData,today90);
  h+='<div class="card" style="margin-bottom:18px;background:linear-gradient(135deg,#1a1a2e,#16213e);padding:18px;border:none">'+
    '<div style="color:#C9A227;font-weight:800;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">🌙 La pensée du soir — Jour '+(today90+1)+'</div>'+
    '<div style="color:#E8E8E8;font-size:14px;line-height:1.8;font-style:italic">'+esc(pensee)+'</div>'+
    '<button id="pensee-share" style="margin-top:12px;font-size:11px;font-weight:800;color:#C9A227;padding:6px 12px;border:1.5px solid #C9A227;border-radius:16px;background:transparent">📤 Partager cette pensée</button></div>';

  // ⚔️ BILAN DE BATAILLE (le dimanche)
  if((today90+1)%7===0&&today90>0){
    var wStart=today90-6;
    var wXP=0,wDone=0,wHalf=0,wLost=0,wFilled=0;
    var habCount={};
    for(var hb2=0;hb2<HABITS.length;hb2++)habCount[HABITS[hb2].id]=0;
    for(var wd=wStart;wd<=today90;wd++){
      var mm=allData[200+wd];
      if(mm){if(mm.xp)wXP+=mm.xp;if(mm.status==="done")wDone++;else if(mm.status==="half")wHalf++;else if(mm.status==="lost")wLost++;}
      var dd2=allData[wd];
      if(dd2&&dd2.habits){wFilled++;for(var hb3=0;hb3<HABITS.length;hb3++){if(dd2.habits[HABITS[hb3].id])habCount[HABITS[hb3].id]++;}}
    }
    var wPv=[];
    for(var wp=wStart;wp<=today90;wp++){if(allData[wp]&&allData[wp].poids)wPv.push(parseFloat(allData[wp].poids));}
    var wDp=wPv.length>=2?Math.round((wPv[wPv.length-1]-wPv[0])*10)/10:null;
    h+='<div class="card" style="margin-bottom:18px;border:2px solid '+K+';padding:16px 18px">'+
      '<div style="font-weight:900;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px"><div class="bar bar-r"></div>⚔️ BILAN DE BATAILLE — Semaine '+Math.floor(today90/7+1)+'</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:12px;text-align:center">'+
      '<div style="flex:1"><div style="font-weight:900;font-size:20px;color:#C9A227">'+wXP+'</div><div style="font-size:9px;color:#AAA;font-weight:700;text-transform:uppercase">XP</div></div>'+
      '<div style="flex:1"><div style="font-weight:900;font-size:20px;color:#4CAF50">'+wDone+'</div><div style="font-size:9px;color:#AAA;font-weight:700;text-transform:uppercase">🟢 Sécurisées</div></div>'+
      '<div style="flex:1"><div style="font-weight:900;font-size:20px;color:#F59E0B">'+wHalf+'</div><div style="font-size:9px;color:#AAA;font-weight:700;text-transform:uppercase">🟡 Contestées</div></div>'+
      '<div style="flex:1"><div style="font-weight:900;font-size:20px;color:'+(wDp!=null&&wDp<=0?"#4CAF50":K)+'">'+(wDp!=null?(wDp>0?"+"+wDp:wDp):"—")+'</div><div style="font-size:9px;color:#AAA;font-weight:700;text-transform:uppercase">kg</div></div></div>';
    // ⚠️ améliorations semaine prochaine
    var warns=[];
    if(wFilled>=3){
      for(var hb4=0;hb4<HABITS.length;hb4++){
        var hid=HABITS[hb4];
        if(habCount[hid.id]/wFilled<0.5)warns.push(hid.icon+" "+hid.label+" "+habCount[hid.id]+"/"+wFilled);
      }
    }
    if(warns.length){
      h+='<div style="background:#FFF8F0;border:1.5px solid #FFE0B2;border-radius:10px;padding:10px 12px">'+
        '<div style="font-weight:800;font-size:10px;color:#E65100;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">⚠️ Priorités semaine prochaine</div>'+
        '<div style="font-size:12px;color:#7A4A00;font-weight:700;line-height:1.8">'+warns.join("<br>")+'</div></div>';
    }else if(wFilled>=3){
      h+='<div style="font-size:12px;color:#4CAF50;font-weight:800">✅ Toutes les lignes tenues. Semaine de guerrier.</div>';
    }
    var wF=[],wP=[],wN=[];
    for(var mw=wStart;mw<=today90;mw++){
      var dmw=allData[mw];
      if(dmw&&dmw.mindset){
        if(dmw.mindset.fier)wF.push(dmw.mindset.fier);
        if(dmw.mindset.positif)wP.push(dmw.mindset.positif);
        if(dmw.mindset.negatif)wN.push(dmw.mindset.negatif);
      }
    }
    if(wF.length||wP.length||wN.length){
      h+='<div style="margin-top:12px;padding-top:12px;border-top:1.5px solid #EEE">'+
        '<div style="font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">🧠 Ta semaine dans ta tête</div>';
      if(wF.length)h+='<div style="font-size:12px;line-height:1.7;margin-bottom:6px"><strong style="color:#B45309">🥇 Tes fiertés :</strong> '+wF.map(esc).join(" · ")+'</div>';
      if(wP.length)h+='<div style="font-size:12px;line-height:1.7;margin-bottom:6px"><strong style="color:#2E7D32">🌟 Tes gratitudes :</strong> '+wP.map(esc).join(" · ")+'</div>';
      if(wN.length)h+='<div style="font-size:12px;line-height:1.7;margin-bottom:8px"><strong style="color:#D52B1E">🌧️ Ce qui a pesé :</strong> '+wN.map(esc).join(" · ")+'</div>';
      h+='<div style="background:#F4FAF2;border-radius:10px;padding:10px 12px;font-size:11px;color:#4A7A3A;line-height:1.7;font-weight:600">💡 Relis la ligne rouge : ce qui revient 2 fois ou plus est un pattern, pas un hasard. Choisis-en UN et fais-en ta mission One Thing de la semaine prochaine. On ne corrige pas tout — on corrige le levier.</div></div>';
    }
    h+='</div>';
  }

  // ALERTE COACH
  var alert=computeAlert(allData,today90);
  if(alert){
    h+='<div class="card" style="margin-bottom:18px;background:#FFF8F0;border:2px solid #FFE0B2;padding:14px 16px">'+
      '<div style="font-weight:900;font-size:11px;color:#E65100;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">⚠️ Message de ton coach</div>'+
      '<div style="font-size:13px;color:#7A4A00;line-height:1.7;font-weight:600">'+alert.msg+'</div></div>';
  }

  // 3 months (mois 2 et 3 verrouillés tant que le précédent n'est pas terminé)
  for(var mi=0;mi<3;mi++){
    var locked=mi*28>today90;
    if(locked){
      h+='<div style="margin-bottom:10px"><div class="month-hdr" style="opacity:.55;cursor:default">'+
        '<div class="mh-left"><div class="bar" style="background:#DDD"></div>'+
        '<span class="mh-name" style="color:#999">🔒 Mois '+(mi+1)+'</span></div>'+
        '<span style="font-size:11px;color:#BBB;font-weight:700">Se débloque au jour '+(mi*28+1)+'</span></div></div>';
      continue;
    }
    var pastDays=[],fd=0;
    for(var x=mi*28;x<Math.min((mi+1)*28,90);x++){
      if(x<=today90){pastDays.push(x);if(allData[x])fd++;}
    }
    var mPct=pastDays.length?Math.round(fd/pastDays.length*100):0;
    var isOpen=state.openMonth===mi;
    var isCurrent=mi===Math.floor(Math.min(today90,89)/28);
    var mColor=mPct>80?"#4CAF50":mPct>50?"#FF9800":R;

    h+='<div style="margin-bottom:10px">'+
      '<button class="month-hdr'+(isOpen?" open":"")+'" data-month="'+mi+'">'+
      '<div class="mh-left"><div class="bar" style="background:'+(isOpen?R:"#DDD")+'"></div>'+
      '<span class="mh-name">Mois '+(mi+1)+'</span>'+
      (isCurrent?'<span class="mh-badge">EN COURS</span>':"")+'</div>'+
      '<div class="mh-right"><div class="mh-track"><div class="mh-fill" style="width:'+mPct+'%;background:'+mColor+'"></div></div>'+
      '<span class="mh-pct">'+mPct+'%</span></div></button>';

    if(isOpen){
      h+='<div class="cal-grid"><div class="cal-days">';
      for(var dn=0;dn<7;dn++)h+='<div class="cal-dayname">'+DAY_SHORT[dn]+'</div>';
      h+='</div>';
      var nRows=Math.ceil((28+wkOff)/7);
      for(var w=0;w<nRows;w++){
        h+='<div class="cal-week">';
        for(var dd=0;dd<7;dd++){
          var slot=w*7+dd-wkOff;
          if(slot<0||slot>=28){h+='<div style="aspect-ratio:1;border-radius:8px;background:#F4F4F4"></div>';continue;}
          var idx=mi*28+slot;
          if(idx>=90){h+='<div></div>';continue;}
          var cellBg="#EEF4FF", cls="";
          if(idx<=today90){
            var dObj=allData[idx];
            if(!dObj||!dObj.habits)cellBg="#FFCDD2";
            else{
              var sc=dayScore(dObj);
              cellBg=sc===100?"#4CAF50":sc>=50?"#C8E6C9":sc>0?"#FFD0B0":"#FFCDD2";
            }
          }else cls=" future";
          if(idx===today90)cls+=" today";
          var hasBilan=allData[idx]&&allData[idx].bilan;
          var msn=allData[200+idx];
          var msnDot="";
          if(msn&&msn.status&&msn.status!=="pending"){
            var mc2=msn.status==="done"?"#4CAF50":msn.status==="half"?"#F59E0B":"#BBB";
            msnDot='<span style="position:absolute;top:2px;left:3px;font-size:7px;color:'+mc2+'">⚡</span>';
          }
          h+='<button class="cal-cell'+cls+'" data-day="'+idx+'" style="background:'+cellBg+'">'+(idx+1)+
            (hasBilan?'<span class="bilan-dot">📋</span>':"")+msnDot+'</button>';
        }
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  return h+'</div>';
}
</script>
<script>
"use strict";

// ═══════════ DAY VIEW ═══════════
function viewDay(name,start){
  var idx=state.selDay;
  var allData=getAllData();
  var d=allData[idx]||{};
  var habits=d.habits||{};
  var today90=getToday90(start);
  var isSunday=(idx+1)%7===0;
  var weekNum=Math.floor(idx/7)+1;
  var dow=idx%7;
  var done=0;
  for(var i=0;i<HABITS.length;i++){if(habits[HABITS[i].id])done++;}

  var h='<div class="app"><div class="hdr"><div style="display:flex;align-items:center;gap:12px">'+
    '<button id="day-back" class="day-back">←</button>'+
    '<div style="flex:1"><div style="color:#fff;font-weight:900;font-size:15px">Jour '+(idx+1)+' · '+DAY_FULL[dow]+'</div>'+
    '<div style="color:#666;font-size:12px">Semaine '+weekNum+' · '+esc(name)+'</div></div>'+
    '<span id="sync-badge" style="font-size:11px"></span><span id="saved-badge" class="saved-badge" style="display:none">✓ Sauvé</span>'+
    '<div class="ring-wrap" id="day-ring">'+svgRing(done/HABITS.length,done===HABITS.length?"#4CAF50":R,48)+
    '<div class="ring-txt" style="font-size:11px;color:#fff" id="day-ring-txt">'+done+'/'+HABITS.length+'</div></div>'+
    '</div></div><div style="padding:16px 14px 0">';

  if(idx>today90)h+='<div class="info-banner"><span style="font-size:16px">📅</span><span>Jour futur — tu peux anticiper</span></div>';

  // poids
  h+='<div class="card" style="display:flex;align-items:center;gap:14px"><span style="font-size:24px">⚖️</span>'+
    '<div style="flex:1"><div class="card-label">POIDS (KG)</div>'+
    '<input id="in-poids" class="num-input" type="number" step="0.1" placeholder="ex: 78.5" value="'+esc(d.poids||"")+'"/></div></div>';

  // sommeil h
  h+='<div class="card" style="display:flex;align-items:center;gap:14px"><span style="font-size:24px">⏱️</span>'+
    '<div style="flex:1"><div class="card-label">HEURES DE SOMMEIL</div>'+
    '<input id="in-sommeil" class="num-input" type="number" step="0.5" min="0" max="24" placeholder="ex: 7.5" value="'+esc(d.sommeilH||"")+'"/></div></div>';

  // mental
  h+='<div class="card"><div class="card-label">🧠 RESSENTI MENTAL</div><div class="mood-row">';
  for(var m=0;m<MENTAL.length;m++){
    var act=d.mental===m;
    h+='<button class="mood-btn'+(act?" active":"")+'" data-mental="'+m+'" style="'+(act?"background:"+MENTAL[m][1]:"")+'">'+MENTAL[m][0]+'</button>';
  }
  h+='</div></div>';

  // energie
  h+='<div class="card"><div class="card-label">⚡ ÉNERGIE PHYSIQUE</div><div class="mood-row">';
  for(var e=0;e<ENERGIE.length;e++){
    var act2=d.energie===e;
    h+='<button class="mood-btn'+(act2?" active":"")+'" data-energie="'+e+'" style="'+(act2?"background:"+ENERGIE[e][1]:"")+'">'+ENERGIE[e][0]+'</button>';
  }
  h+='</div></div>';

  // habits
  h+='<div style="margin-top:16px"><div class="card-label">HABITUDES DU JOUR</div>';
  for(var hb=0;hb<HABITS.length;hb++){
    var hab=HABITS[hb];
    var checked=!!habits[hab.id];
    h+='<div class="habit'+(checked?" checked":"")+'" data-habit="'+hab.id+'" style="'+(checked?"background:"+hab.color+";border-color:"+hab.color+";box-shadow:0 3px 12px "+hab.color+"33":"")+'">'+
      '<div class="habit-left"><span class="habit-icon">'+hab.icon+'</span><span class="habit-name">'+hab.label+'</span></div>'+
      '<div class="habit-check">'+(checked?"✓":"")+'</div></div>';
  }
  h+='</div>';

  // 🧠 MINDSET DU JOUR
  var ms=d.mindset||{};
  h+='<div style="margin-top:16px"><div class="card-label">🧠 MINDSET DU JOUR — 3 questions, 3 minutes</div>'+

    '<div class="card" style="padding:16px">'+

function bindDay(name,start){
  var idx=state.selDay;
  function cur(){return getAllData()[idx]||{};}
  function persist(patch){
    var d=cur();
    for(var k in patch)d[k]=patch[k];
    if(!d.habits)d.habits={};
    saveDay(idx,d);
    var badge=document.getElementById("saved-badge");
    if(badge){badge.style.display="inline";setTimeout(function(){if(badge)badge.style.display="none";},1500);}
  }

  document.getElementById("day-back").addEventListener("click",function(){state.selDay=null;state.showBilan=false;render();});

  document.getElementById("in-poids").addEventListener("input",function(){persist({poids:this.value});});
  document.getElementById("in-sommeil").addEventListener("input",function(){persist({sommeilH:this.value});});

  var mbtns=document.querySelectorAll("[data-mental]");
  for(var i=0;i<mbtns.length;i++){
    mbtns[i].addEventListener("click",function(){
      var v=parseInt(this.getAttribute("data-mental"));
      var d=cur();
      persist({mental:d.mental===v?null:v});
      render();
    });
  }
  var ebtns=document.querySelectorAll("[data-energie]");
  for(var j=0;j<ebtns.length;j++){
    ebtns[j].addEventListener("click",function(){
      var v=parseInt(this.getAttribute("data-energie"));
      var d=cur();
      persist({energie:d.energie===v?null:v});
      render();
    });
  }
  var hbtns=document.querySelectorAll("[data-habit]");
  for(var k2=0;k2<hbtns.length;k2++){
    hbtns[k2].addEventListener("click",function(){
      var id=this.getAttribute("data-habit");
      var d=cur();
      var habits=d.habits||{};
      habits[id]=!habits[id];
      persist({habits:habits});
      render();
    });
  }
  function saveMindset(){
    var d=cur();
    var m=d.mindset||{};
    m.fier=document.getElementById("ms-fier").value;
    m.positif=document.getElementById("ms-positif").value;
    m.negatif=document.getElementById("ms-negatif").value;
    persist({mindset:m});
  }
  ["ms-fier","ms-positif","ms-negatif"].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener("input",saveMindset);
  });
  var bt=document.getElementById("bilan-toggle");
  if(bt)bt.addEventListener("click",function(){state.showBilan=!state.showBilan;render();});

  var sbtns=document.querySelectorAll("[data-scale]");
  for(var s=0;s<sbtns.length;s++){
    sbtns[s].addEventListener("click",function(){
      var key=this.getAttribute("data-scale"), val=parseInt(this.getAttribute("data-val"));
      var d=cur();
      var b=d.bilan||{};
      b[key]=b[key]===val?null:val;
      persist({bilan:b});
      render();
    });
  }
  var bs=document.getElementById("bilan-save");
  if(bs)bs.addEventListener("click",function(){
    var d=cur();
    var b=d.bilan||{};
    b.victoire=document.getElementById("b-victoire").value;
    b.blocage=document.getElementById("b-blocage").value;
    b.ressenti=document.getElementById("b-ressenti").value;
    b.question=document.getElementById("b-question").value;
    persist({bilan:b});
    state.showBilan=false;
    render();
  });
}

ont-size:9px;color:#AAA;font-weight:700;text-transform:uppercase;margin-bottom:2px}.bt{font-size:12px;color:#333;line-height:1.5}.ftr{background:#1A1A1A;padding:20px;text-align:center;margin-top:14px}.fm{color:#666;font-size:11px;line-height:1.8}.fs{color:#fff;font-weight:900;font-size:13px;margin-top:8px}@media print{body{background:#fff}}";

    var dm=allData[mi2];
    if(dm&&dm.mindset){
      if(dm.mindset.fier)fiers.push({d:mi2+1,t:dm.mindset.fier});
      if(dm.mindset.positif)positifs.push({d:mi2+1,t:dm.mindset.positif});
      if(dm.mindset.negatif)negatifs.push({d:mi2+1,t:dm.mindset.negatif});
    }
  }
  if(fiers.length||positifs.length||negatifs.length){
    html+="<div class='sec'><div class='st'><div class='sb' style='background:#7B1FA2'></div><span class='sl'>🧠 Mindset — ce qui revient</span></div>";
    function msBlock(title,color,items){
      if(!items.length)return "";
      var o="<div class='ch'><div class='ct' style='color:"+color+"'>"+title+" ("+items.length+")</div><div style='font-size:12px;color:#333;line-height:1.9'>";
      for(var x=0;x<items.length;x++){o+="<strong style='color:#BBB'>J"+items[x].d+"</strong> · "+esc(items[x].t)+"<br>";}
      return o+"</div></div>";
    }
    html+=msBlock("🥇 Fiertés","#B45309",fiers);
    html+=msBlock("🌟 Gratitudes","#2E7D32",positifs);
    html+=msBlock("🌧️ Points négatifs — à corriger","#D52B1E",negatifs);
    html+="<div class='ch' style='background:#FFF8F0'><div style='font-size:11px;color:#B45309;font-weight:700;line-height:1.7'>💡 Relis la colonne négative : ce qui revient 3 fois ou plus est un pattern. C\'est là qu\'on agit le mois prochain.</div></div>";
    html+="</div>";
  }

  if(bilans.length){
    html+="<div class='sec'><div class='st'><div class='sb' style='background:#D52B1E'></div><span class='sl'>Bilans du dimanche</span></div>";
    for(var bi2=0;bi2<bilans.length;bi2++){
      var bb=bilans[bi2];
      html+="<div class='bc'><div class='bw'>Semaine "+(Math.floor((bb.day-1)/7)+1)+" — Jour "+bb.day+"</div>";
      if(bb.bilan.victoire)html+="<div class='bi'><div class='bk'>🏆 Victoire</div><div class='bt'>"+esc(bb.bilan.victoire)+"</div></div>";
      if(bb.bilan.blocage)html+="<div class='bi'><div class='bk'>🤛 Difficulté</div><div class='bt'>"+esc(bb.bilan.blocage)+"</div></div>";
      if(bb.bilan.ressenti)html+="<div class='bi'><div class='bk'>💬 Ressenti</div><div class='bt'>"+esc(bb.bilan.ressenti)+"</div></div>";
      if(bb.bilan.question)html+="<div class='bi'><div class='bk' style='color:#D52B1E'>❓ Question pour Akli</div><div class='bt' style='color:#D52B1E;font-weight:700'>"+esc(bb.bilan.question)+"</div></div>";
      html+="</div>";
    }
    html+="</div>";
  }
  html+="<div class='ftr'><div class='fm'>Rapport généré automatiquement<br>Programme TransfoPhysique 90 jours · AM Coach Genève</div><div class='fs'>Akli — AM Coach Genève</div></div>";
  html+="</div></body></html>";

  var win=window.open("","_blank");
  if(win){win.document.write(html);win.document.close();}
}

<script>
"use strict";

// ═══════════ COACH LOGIN ═══════════
var COACH_PASS="akli2024";
function viewCoachLogin(){

// ═══════════ COACH DETAIL ═══════════
function viewCoachDetail(){
  var clients=lsGet("amcoach_clients",[]);

  for(var i=0;i<clients.length;i++){if(clients[i].slug===state.coachDetail){c=clients[i];break;}}

  var allData=lsGet("amcoach_"+c.slug,{});

  var series=computeSeries(allData,90);

  var avgScore=avgOf(series,"score"), avgMental=avgOf(series,"mental");
  var pv=series.map(function(s){return s.poids;}).filter(function(v){return v!=null;});
  var dp=pv.length>=2?Math.round((pv[pv.length-1]-pv[0])*10)/10:null;
  var alert=computeAlert(allData,t90);
  var month=currentMonth(t90);
  var goal=getGoal(allData,month);

  var h='<div class="app" style="max-width:480px">'+
    '<div class="hdr"><div style="display:flex;align-items:center;gap:12px">'+

    (function(){var la=lastActLabel(allData);return '<div style="font-size:12px;font-weight:800;margin-top:3px;color:'+la.c+'">📱 Dernière activité : '+la.t+'</div>';})()+'</div></div></div>'+

    '<div class="kpi-card"><div class="kpi-val" style="color:'+B+'">'+(avgMental!=null?avgMental+"%":"—")+'</div><div class="kpi-lbl">Mental</div></div></div>'+
    '<div class="kpi-row" style="margin-bottom:14px">'+
    '<div class="kpi-card"><div class="kpi-val">'+(pv.length?pv[pv.length-1]:"—")+'<span style="font-size:14px"> kg</span></div><div class="kpi-lbl">Poids actuel</div></div>'+
    '<div class="kpi-card"><div class="kpi-val" style="color:'+(dp==null?"#CCC":dp<=0?"#4CAF50":R)+'">'+(dp!=null?(dp>0?"+"+dp:dp):"—")+'<span style="font-size:14px"> kg</span></div><div class="kpi-lbl">Évolution</div></div></div>';

  // Objectif du mois
  if(goal){

      '<div style="font-weight:900;font-size:15px">'+goal.target+' kg — 🎁 '+esc(goal.reward||"—")+'</div></div>';

  // Alerte en cours

      '<div style="font-size:12px;color:#7A4A00;line-height:1.6">'+alert.msg+'</div></div>';
  }

  // Courbes
  function chart(title,color,key,min,max){
    var vals=series.slice(0,Math.max(t90+1,7)).map(function(s){return s[key];});
    return '<div class="chart-card"><div class="chart-hdr"><div class="chart-dot" style="background:'+color+'"></div>'+
      '<span class="chart-title">'+title+'</span></div>'+svgLineChart(vals,color,{min:min,max:max})+'</div>';
  }
  h+=chart("Score global",R,"score",0,100);
  h+=chart("Poids (kg)","#555","poids",null,null);
  h+=chart("Mental",B,"mental",0,100);

  // Bilans dimanche avec questions
  var bilans=series.filter(function(s){return s.bilan&&(s.bilan.victoire||s.bilan.ressenti||s.bilan.blocage||s.bilan.question);});
  if(bilans.length){

    for(var b=bilans.length-1;b>=0;b--){
      var bl=bilans[b];
      h+='<div class="card" style="border-left:4px solid '+R+'">'+

      if(bl.bilan.question)h+='<div style="margin-bottom:6px"><div style="font-size:9px;color:'+R+';font-weight:800;text-transform:uppercase">❓ Question</div><div style="font-size:13px;color:'+R+';font-weight:700;line-height:1.5">'+esc(bl.bilan.question)+'</div></div>';
      if(bl.bilan.victoire)h+='<div style="margin-bottom:6px"><div style="font-size:9px;color:#AAA;font-weight:800;text-transform:uppercase">🏆 Victoire</div><div style="font-size:12px;color:#333;line-height:1.5">'+esc(bl.bilan.victoire)+'</div></div>';
      if(bl.bilan.blocage)h+='<div style="margin-bottom:6px"><div style="font-size:9px;color:#AAA;font-weight:800;text-transform:uppercase">🤛 Difficulté</div><div style="font-size:12px;color:#333;line-height:1.5">'+esc(bl.bilan.blocage)+'</div></div>';
      if(bl.bilan.ressenti)h+='<div><div style="font-size:9px;color:#AAA;font-weight:800;text-transform:uppercase">💬 Ressenti</div><div style="font-size:12px;color:#333;line-height:1.5">'+esc(bl.bilan.ressenti)+'</div></div>';
      h+='</div>';
    }
  }

  // 🚀 Date de départ (modifiable)
  h+='<div class="card" style="border-left:4px solid '+B+';padding:13px 15px;display:flex;align-items:center;justify-content:space-between">'+
    '<span style="font-weight:800;font-size:13px">🚀 Départ : <strong>'+new Date(c.start_date).toLocaleDateString("fr-FR")+'</strong></span>'+
    '<button id="cd-start" style="font-size:12px;font-weight:800;color:'+B+';padding:6px 12px;border:1.5px solid '+B+';border-radius:18px;background:#fff">✏️ Modifier</button></div>';

  // 🔑 Contrôle d'accès
  var acc2=allData[504]||{};
  var isOff=!!acc2.off;
  var isExpired=acc2.end&&new Date().toISOString().split("T")[0]>acc2.end;
  var accStatus=isOff?'<span style="color:#D52B1E">⛔ COUPÉ</span>':isExpired?'<span style="color:#E65100">⏸️ EXPIRÉ ('+acc2.end+')</span>':'<span style="color:#4CAF50">✅ ACTIF'+(acc2.end?' → '+acc2.end:' · illimité')+'</span>';
  h+='<div class="card" style="border-left:4px solid '+(isOff||isExpired?"#D52B1E":"#4CAF50")+';padding:13px 15px">'+
    '<div style="font-weight:800;font-size:13px;margin-bottom:10px">🔑 Accès : '+accStatus+'</div>'+
    '<div style="display:flex;gap:8px">'+
    '<button id="acc-end" style="flex:1;font-size:11px;font-weight:800;padding:9px 0;border:1.5px solid #999;border-radius:10px;background:#fff;color:#555">📅 Date de fin</button>'+
    '<button id="acc-inf" style="flex:1;font-size:11px;font-weight:800;padding:9px 0;border:1.5px solid #999;border-radius:10px;background:#fff;color:#555">♾️ Illimité</button>'+
    '<button id="acc-toggle" style="flex:1;font-size:11px;font-weight:800;padding:9px 0;border:1.5px solid '+(isOff?"#4CAF50":"#D52B1E")+';border-radius:10px;background:#fff;color:'+(isOff?"#4CAF50":"#D52B1E")+'">'+(isOff?"✅ Réactiver":"⛔ Couper")+'</button></div></div>';

  // 🎂 Anniversaire
  var bd3=allData[503]||{};
  var bday=bd3.bday||null;
  var bdTxt="";
  if(bday){
    bdTxt='<strong>'+bday.split("-")[1]+'/'+bday.split("-")[0]+(bd3.year?'/'+bd3.year:'')+'</strong>';
    if(bd3.year){var age=new Date().getFullYear()-parseInt(bd3.year);bdTxt+=' <span style="color:#999">('+age+' ans)</span>';}
  }
  h+='<div class="card" style="border-left:4px solid #F59E0B;padding:13px 15px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between">'+
    '<span style="font-weight:800;font-size:13px">🎂 Anniversaire : '+(bday?bdTxt:'<span style="color:#BBB">non renseigné</span>')+'</span>'+
    '<button id="cd-bday" style="font-size:12px;font-weight:800;color:#D52B1E;padding:6px 12px;border:1.5px solid #D52B1E;border-radius:18px;background:#fff">'+(bday?'✏️':'+ Ajouter')+'</button></div>'+
    (bday?(function(){
      var now=new Date();var y=now.getFullYear();
      var next=new Date(y,parseInt(bday.split("-")[0])-1,parseInt(bday.split("-")[1]));
      if(next<now)next.setFullYear(y+1);
      var ds=next.getFullYear()+("0"+(next.getMonth()+1)).slice(-2)+("0"+next.getDate()).slice(-2);
      return '<a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent("🎂 Anniversaire "+c.name+" — AM Coach")+'&dates='+ds+'/'+ds+'&recur=RRULE:FREQ%3DYEARLY&details='+encodeURIComponent("Envoyer un message d\'anniversaire à ton client 🎉")+'" target="_blank" style="display:block;text-align:center;margin-top:10px;font-size:12px;font-weight:800;color:#0057A8;text-decoration:none">📅 Ajouter à mon Google Agenda (rappel annuel)</a>';
    })():'')+'</div>';

  // Mindset récent (14 derniers jours avec réponses, plus récent en premier)
  var msEntries=[];
  for(var mi3=t90;mi3>=0&&msEntries.length<14;mi3--){
    var dmd=allData[mi3];
    if(dmd&&dmd.mindset&&(dmd.mindset.fier||dmd.mindset.positif||dmd.mindset.negatif)){
      msEntries.push({day:mi3+1,m:dmd.mindset});
    }
  }
  if(msEntries.length){
    h+='<div style="display:flex;align-items:center;gap:8px;margin:16px 0 10px"><div class="bar" style="background:#7B1FA2"></div><span style="font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:1px">🧠 Mindset récent</span></div>';
    for(var me=0;me<msEntries.length;me++){
      var en=msEntries[me];
      h+='<div class="card" style="border-left:4px solid #7B1FA2;padding:13px 15px">'+
        '<div style="font-weight:800;font-size:10px;color:#7B1FA2;text-transform:uppercase;margin-bottom:7px">Jour '+en.day+'</div>';
      if(en.m.fier)h+='<div style="font-size:12px;color:#333;line-height:1.6;margin-bottom:4px">🥇 '+esc(en.m.fier)+'</div>';
      if(en.m.positif)h+='<div style="font-size:12px;color:#333;line-height:1.6;margin-bottom:4px">🌟 '+esc(en.m.positif)+'</div>';
      if(en.m.negatif)h+='<div style="font-size:12px;color:'+R+';line-height:1.6;font-weight:700">🌧️ '+esc(en.m.negatif)+'</div>';
      h+='</div>';
    }
  }

  // Zone danger : suppression
  h+='<div style="margin-top:24px;padding-top:16px;border-top:1.5px solid #EEE">'+
    '<button id="cd-delete" style="width:100%;padding:13px 0;border-radius:12px;background:#fff;border:2px solid #FFCDD2;color:'+R+';font-weight:800;font-size:13px">🗑️ Supprimer ce client</button>'+
    '<div style="font-size:11px;color:#BBB;text-align:center;margin-top:6px">Supprime définitivement toutes ses données</div></div>';

  return h+'</div></div>';
}

// ═══════════ COACH DASH ═══════════
function viewCoachDash(){
  var clients=lsGet("amcoach_clients",[]);
  var h='<div class="app" style="max-width:480px">'+
    '<div class="hdr"><div class="hdr-brand"><div class="bar bar-r"></div>'+
    '<span class="hdr-title">Coach Dashboard</span><div class="bar bar-b"></div></div>'+
    '<div class="hdr-sub" style="color:#666;font-weight:400;font-size:12px">AM Coach Genève · TransfoPhysique</div></div>'+
    '<div style="padding:16px 14px 0">'+
    '<button id="form-toggle" class="big-btn'+(state.showForm?" gray":"")+'" style="padding:16px 0;font-size:14px">'+

  if(state.showForm){

      '<div style="font-weight:900;font-size:14px;margin-bottom:16px">Nouveau client</div>'+
      '<div class="card-label">PRÉNOM</div>'+
      '<input id="nc-name" class="num-input" style="font-size:15px;font-weight:400;margin-bottom:12px" placeholder="ex: Sarah"/>'+
      '<div class="card-label">LIEN (identifiant)</div>'+
      '<input id="nc-slug" class="num-input" style="font-size:15px;font-weight:400;margin-bottom:4px" placeholder="ex: sarah"/>'+
      '<div id="nc-preview" style="font-size:11px;color:#AAA;margin-bottom:12px"></div>'+
      '<div class="card-label">DATE DE DÉPART</div>'+
      '<input id="nc-date" type="date" class="num-input" style="font-size:15px;font-weight:400;margin-bottom:12px" value="'+new Date().toISOString().split("T")[0]+'"/>'+
      '<div class="card-label">DATE DE FIN D\'ACCÈS (OPTIONNEL — vide = illimité)</div>'+
      '<input id="nc-end" type="date" class="num-input" style="font-size:15px;font-weight:400;margin-bottom:16px"/>'+
      '<button id="nc-create" class="big-btn" style="padding:14px 0;font-size:14px;margin-bottom:0">Créer le lien →</button></div>';
  }

  h+='<input id="client-search" class="num-input" placeholder="\ud83d\udd0d Rechercher un client..." value="'+esc(state.searchQ||"")+'" style="font-size:15px;font-weight:400;margin-bottom:14px"/>';
  var q=(state.searchQ||"").toLowerCase();

  if(!clients.length){
    h+='<div style="text-align:center;color:#AAA;padding:40px">Aucun client encore.</div>';
  }else if(!shown.length){
    h+='<div style="text-align:center;color:#AAA;padding:40px">Aucun r\u00e9sultat pour \u00ab '+esc(state.searchQ)+' \u00bb</div>';
  }else{
    for(var i=0;i<shown.length;i++){
      var c=shown[i];
      var t90=getToday90(c.start_date);
      var cd=lsGet("amcoach_"+c.slug,{});
      var filled=0;
      for(var x=0;x<=t90;x++){if(cd[x])filled++;}
      var score=Math.round(filled/Math.max(t90+1,1)*100);
      var scol=score>80?"#4CAF50":score>50?"#FF9800":R;
      h+='<div class="card" style="padding:18px 16px;margin-bottom:12px">'+
        '<div class="cd-open" data-detail="'+esc(c.slug)+'" style="display:flex;align-items:center;gap:14px;margin-bottom:14px;cursor:pointer">'+
        '<div class="ring-wrap">'+svgRing(score/100,scol,56)+
        '<div class="ring-txt" style="font-size:13px">'+score+'%</div></div>'+
        '<div style="flex:1"><div style="font-weight:900;font-size:18px">'+esc(c.name)+'</div>'+
        '<div style="font-size:12px;color:#AAA;margin-top:2px">Jour '+Math.min(t90+1,90)+'/90 · départ '+new Date(c.start_date).toLocaleDateString("fr-FR")+'</div>'+
        (function(){var la=lastActLabel(lsGet("amcoach_"+c.slug,{}));return '<div style="font-size:11px;font-weight:800;margin-top:3px;color:'+la.c+'">📱 Dernière activité : '+la.t+'</div>';})()+'</div></div>'+
        '<button class="copy-link big-btn" data-slug="'+esc(c.slug)+'" style="padding:12px 0;font-size:13px;background:'+K+';box-shadow:none;margin-bottom:8px">📋 Copier lien TRACKER</button>'+
        '<button class="copy-menu big-btn" data-slug="'+esc(c.slug)+'" style="padding:12px 0;font-size:13px;background:#2E7D32;box-shadow:none;margin-bottom:0">🍽️ Copier lien MENU</button></div>';
    }
  }
  return h+'</div></div>';
}

function loadCoachDataFromCloud(){
  Promise.all([
    sbFetch("clients?select=*&order=created_at.desc").then(function(r){return r.json();}),
    sbFetch("tracking?select=client_slug,day_index,data").then(function(r){return r.json();})
  ]).then(function(results){
    var clients=results[0]||[], rows=results[1]||[];
    if(clients.length)lsSet("amcoach_clients",clients);
    var bySlug={};
    for(var i=0;i<rows.length;i++){
      var r=rows[i];
      if(!bySlug[r.client_slug])bySlug[r.client_slug]={};
      bySlug[r.client_slug][r.day_index]=r.data;
    }
    for(var slug in bySlug){lsSet("amcoach_"+slug,bySlug[slug]);}
    render();
  }).catch(function(){});
}

function bindCoach(){
  var cp=document.getElementById("coach-pass"), cg=document.getElementById("coach-go");
  if(cp&&cg){
    function tryLogin(){if(cp.value===COACH_PASS){state.coachAuthed=true;loadCoachDataFromCloud();render();}}
    cg.addEventListener("click",tryLogin);
    cp.addEventListener("keydown",function(e){if(e.key==="Enter")tryLogin();});
    return;
  }
  var ft=document.getElementById("form-toggle");
  if(ft)ft.addEventListener("click",function(){state.showForm=!state.showForm;render();});
  var ncName=document.getElementById("nc-name"), ncSlug=document.getElementById("nc-slug"), ncPrev=document.getElementById("nc-preview");
  if(ncName){
    function slugify(s){return s.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");}
    ncName.addEventListener("input",function(){ncSlug.value=slugify(this.value);ncPrev.textContent=ncSlug.value?"Lien : ?client="+ncSlug.value:"";});
    ncSlug.addEventListener("input",function(){this.value=slugify(this.value);ncPrev.textContent=this.value?"Lien : ?client="+this.value:"";});
    document.getElementById("nc-create").addEventListener("click",function(){
      var name=ncName.value.trim(), slug=ncSlug.value.trim();
      if(!name||!slug)return;
      var clients=lsGet("amcoach_clients",[]);

    var q=getAllData()[400+today90]||{};
    q.p=!q.p;saveDay(400+today90,q);render();
    var hp=document.getElementById("qg-house");if(hp)hp.classList.add("qg-shake");
  });
  var qQuests=document.querySelectorAll(".qg-quest");
  for(var qq=0;qq<qQuests.length;qq++){
    qQuests[qq].addEventListener("click",function(){
      var n=this.getAttribute("data-q");
      var q=getAllData()[400+today90]||{};
      if(n==="1")q.s1=!q.s1;else q.s2=!q.s2;
      saveDay(400+today90,q);render();
      var hq=document.getElementById("qg-house");if(hq)hq.classList.add("qg-shake");
    });
  }
  var qgD=document.getElementById("qg-digital");
  if(qgD)qgD.addEventListener("click",function(){
    var q=getAllData()[400+today90]||{};
    q.e=!q.e;saveDay(400+today90,q);render();
    var he=document.getElementById("qg-house");if(he)he.classList.add("qg-shake");
  });
  // Dream autosave
  var dbS=document.getElementById("db-semaine"), dbV=document.getElementById("db-vie");
  if(dbS&&dbV){
    function saveDream(){
      saveDay(501,{semaine:dbS.value,vie:dbV.value});
      var sv=document.getElementById("db-saved");
      if(sv){sv.textContent="✓ Sauvegardé";setTimeout(function(){if(sv)sv.textContent="";},1500);}
    }
    dbS.addEventListener("input",saveDream);
    dbV.addEventListener("input",saveDream);
  }
  // Bloc suivant
  var nb=document.getElementById("next-bloc");
  if(nb)nb.addEventListener("click",function(){
    if(!confirm("Démarrer le Bloc "+(BLOC+1)+"/4 ? Nouveau cycle de 90 jours dès aujourd'hui."))return;
    var newBloc=BLOC+1;
    var eff=BASE_CLIENT+"-b"+newBloc;
    localStorage.setItem("amcoach_bloc_"+BASE_CLIENT,String(newBloc));
    var today=new Date().toISOString().split("T")[0];
    localStorage.setItem("amcoach_name_"+eff,name);
    localStorage.setItem("amcoach_start_"+eff,today);
    sbFetch("clients?on_conflict=slug",{method:"POST",prefer:"resolution=merge-duplicates",body:{slug:eff,name:name,start_date:today}}).catch(function(){});
    window.location.reload();
  });
  var dip=document.getElementById("diplome-btn");
  if(dip)dip.addEventListener("click",function(){
    var html=generateDiplome(name,start,getAllData());
    var win=window.open("","_blank");
    if(win){win.document.write(html);win.document.close();}
  });
  var bde=document.getElementById("bday-edit");
  if(bde)bde.addEventListener("click",function(){
    var v=prompt("Ta date d'anniversaire (JJ/MM ou JJ/MM/AAAA) :","");
    if(!v)return;
    var mm=v.match(/^(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{4}))?$/);
    if(!mm){alert("Format : JJ/MM ou JJ/MM/AAAA (ex: 24/09/1985)");return;}
    var bday=("0"+mm[2]).slice(-2)+"-"+("0"+mm[1]).slice(-2);
    saveDay(503,{bday:bday,year:mm[3]||null});
    render();
  });
  var gs=document.getElementById("goal-set");
  if(gs)gs.addEventListener("click",function(){state.showGoalForm=true;render();});
  var ge=document.getElementById("goal-edit");
  if(ge)ge.addEventListener("click",function(){state.showGoalForm=true;render();});
  var gsave=document.getElementById("goal-save");
  if(gsave)gsave.addEventListener("click",function(){
    var t=parseFloat(document.getElementById("goal-target").value);
    var rw=document.getElementById("goal-reward").value.trim();
    if(!t)return;
    saveDay(100+month,{target:t,reward:rw});
    state.showGoalForm=false;
    render();
  });
  var navs=document.querySelectorAll("[data-nav]");
  for(var i=0;i<navs.length;i++){
    navs[i].addEventListener("click",function(){state.view=this.getAttribute("data-nav");render();});
  }
  var months=document.querySelectorAll("[data-month]");
  for(var m=0;m<months.length;m++){
    months[m].addEventListener("click",function(){
      var mi=parseInt(this.getAttribute("data-month"));
      state.openMonth=state.openMonth===mi?-1:mi;
      render();
    });
  }
  var cells=document.querySelectorAll("[data-day]");
  for(var c=0;c<cells.length;c++){
    cells[c].addEventListener("click",function(){
      state.selDay=parseInt(this.getAttribute("data-day"));
      state.showBilan=false;
      render();
    });
  }
  var filters=document.querySelectorAll("[data-filter]");
  for(var f=0;f<filters.length;f++){
    filters[f].addEventListener("click",function(){state.filter=this.getAttribute("data-filter");render();});
  }
  var rapports=document.querySelectorAll("[data-rapport]");
  for(var r2=0;r2<rapports.length;r2++){
    rapports[r2].addEventListener("click",function(){
      if(this.classList.contains("disabled"))return;
      openRapport(name,start,parseInt(this.getAttribute("data-rapport")));
    });
  }
}

// ═══════════ BOOT ═══════════
(function(){
  render(); // instant render with local data
  if(CLIENT){
    loadFromCloud(function(){
      var start=lsGetStr("amcoach_start_"+CLIENT);
      if(start)state.openMonth=Math.floor(Math.min(getToday90(start),89)/28);
      render(); // re-render with cloud data
    });
  }
})();
</script>
</body>
</html>
